name: Codeforces Div3/Div4 Notifier

on:
  schedule:
    # Run every 6 hours (12 AM, 6 AM, 12 PM, 6 PM UTC)
    - cron: "0 */6 * * *"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        run: python main.py
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}

      - name: Commit state files
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git add last_contest.txt
          git add last_reminder.txt

          git diff --cached --quiet || git commit -m "Update contest and reminder state"
          git push