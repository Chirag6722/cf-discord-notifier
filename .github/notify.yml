name: Codeforces Div3/Div4 Notifier

on:
  schedule:
    # Every day at 8:00 AM IST (2:30 AM UTC)
    - cron: "30 2 * * *"

  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        run: python main.py

      - name: Commit last_contest.txt
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git add last_contest.txt

          git diff --cached --quiet || git commit -m "Update last contest"
          git push